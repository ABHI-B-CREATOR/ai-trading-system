# Force Python provider
providers = ["python"]

[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = ["python -m ensurepip --upgrade", "python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[start]
cmd = "cd 8_BACKEND_APPLICATION_LAYER && python -m gunicorn app_server:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --threads 1 --timeout 120"
