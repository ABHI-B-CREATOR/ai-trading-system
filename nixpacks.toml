# Force Python provider with virtual environment
providers = ["python"]

[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[variables]
PATH = "/opt/venv/bin:${PATH}"

[start]
cmd = "cd 8_BACKEND_APPLICATION_LAYER && /opt/venv/bin/gunicorn app_server:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --threads 1 --timeout 120"
