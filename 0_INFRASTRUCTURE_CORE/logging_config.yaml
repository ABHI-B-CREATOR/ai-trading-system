version: 1

formatters:
  standard:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"

handlers:

  infra_file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: logs/infra.log
    encoding: utf8

  market_file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: logs/market.log
    encoding: utf8

  execution_file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: logs/execution.log
    encoding: utf8

  error_file:
    class: logging.FileHandler
    level: ERROR
    formatter: standard
    filename: logs/error.log
    encoding: utf8

loggers:

  infra:
    handlers: [infra_file]
    level: INFO
    propagate: no

  market:
    handlers: [market_file]
    level: INFO
    propagate: no

  execution:
    handlers: [execution_file]
    level: INFO
    propagate: no

root:
  handlers: [error_file]
  level: ERROR